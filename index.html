<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo-rgaa-vitrine.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta name="robots" content="index,follow,max-image-preview:large,max-snippet:-1,max-video-preview:-1" />
    <meta name="author" content="Aurélien Lewin" />
    <meta name="application-name" content="Annuaire RGAA" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f8fafc" media="(prefers-color-scheme: light)" />
    <meta
      name="keywords"
      content="RGAA, accessibilité numérique, conformité RGAA, déclaration accessibilité, annuaire accessibilité"
    />
    <meta
      name="description"
      content="Annuaire français pour valoriser la conformité RGAA : page de déclaration, score et bonnes pratiques officielles."
    />
    <link rel="canonical" href="https://rgaa-vitrine.org/" />
    <link rel="alternate" href="https://rgaa-vitrine.org/" hreflang="fr-FR" />

    <meta property="og:locale" content="fr_FR" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Annuaire RGAA" />
    <meta property="og:title" content="Annuaire RGAA" />
    <meta
      property="og:description"
      content="Valorisez la conformité RGAA de votre site avec une vitrine claire, filtrable et orientée accessibilité."
    />
    <meta property="og:url" content="https://rgaa-vitrine.org/" />
    <meta property="og:image" content="https://rgaa-vitrine.org/logo-rgaa-vitrine.svg" />
    <meta property="og:image:alt" content="Logo officiel Annuaire RGAA" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Annuaire RGAA" />
    <meta
      name="twitter:description"
      content="Analysez une URL et mettez en avant la conformité RGAA de votre site."
    />
    <meta name="twitter:image" content="https://rgaa-vitrine.org/logo-rgaa-vitrine.svg" />
    <title>Annuaire RGAA</title>
    <script id="app-jsonld" type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Annuaire RGAA",
        "inLanguage": "fr-FR",
        "description": "Plateforme de valorisation de la conformité RGAA des sites web.",
        "publisher": {
          "@type": "Organization",
          "name": "Annuaire RGAA",
          "url": "https://github.com/aurelienlewin",
          "logo": "https://rgaa-vitrine.org/logo-rgaa-vitrine.svg"
        },
        "creator": {
          "@type": "Person",
          "name": "Aurélien Lewin",
          "url": "https://github.com/aurelienlewin"
        }
      }
    </script>
    <script>
      (function () {
        try {
          var rawPreference = window.localStorage.getItem('annuaire-rgaa-theme');
          var preference = rawPreference === 'light' || rawPreference === 'dark' ? rawPreference : 'system';
          var systemDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          var resolvedTheme = preference === 'system' ? (systemDark ? 'dark' : 'light') : preference;
          var root = document.documentElement;
          root.setAttribute('data-theme', resolvedTheme);
          root.classList.toggle('dark', resolvedTheme === 'dark');
          root.style.colorScheme = resolvedTheme;
        } catch (_) {
          // Keep default CSS preference when storage is unavailable.
        }
      })();
    </script>
    <script>
      (function () {
        var url = window.location.origin + window.location.pathname;
        var canonical = document.querySelector('link[rel="canonical"]');
        var ogUrl = document.querySelector('meta[property="og:url"]');
        if (canonical) canonical.setAttribute("href", url);
        if (ogUrl) ogUrl.setAttribute("content", url);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      Cette application nécessite JavaScript pour afficher l’annuaire RGAA interactif.
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
