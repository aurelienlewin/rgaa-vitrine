    <style id="critical-secondary-header-css">
      html {
        box-sizing: border-box;
        background: #f3f6fd;
        color: #121a2b;
      }

      *,
      *::before,
      *::after {
        box-sizing: inherit;
      }

      body {
        margin: 0;
        min-width: 320px;
        line-height: 1.5;

          "Segoe UI",

        color: #121a2b;
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      #root {
        min-height: 100vh;
      }

      .app-secondary-header {
        border-bottom: 1px solid #bec9dc;
        background: #ffffff;
      }

      .app-secondary-header__inner {
        max-width: 64rem;
        margin: 0 auto;
        padding: 1.5rem 1rem;
      }

      .app-secondary-header__top {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
      }

      .app-secondary-header__title {
        margin: 0;
        font-size: 1.5rem;
        line-height: 2rem;
        font-weight: 700;
      }

      .app-secondary-theme-toggle,
      .app-secondary-nav__link,
      .app-global-search-form__button,
      .app-global-search-form__control {
        min-height: 2.75rem;
      }

      .app-secondary-theme-toggle,
      .app-secondary-nav__link {
        display: inline-flex;
        align-items: center;
        border: 1px solid #33415f;
        border-radius: 0.75rem;
        padding: 0.5rem 1rem;
        background: transparent;
        color: #121a2b;
        font-size: 0.875rem;
        font-weight: 600;
      }

      .app-secondary-nav {
        margin-top: 1rem;
      }

      .app-secondary-nav__list {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .app-global-search-form {
        margin-top: 1rem;
        border: 1px solid #33415f;
        border-radius: 1rem;
        padding: 1rem;
        background: #f5f8ff;
        box-shadow: 0 1px 2px rgba(18, 26, 43, 0.08);
      }

      .app-global-search-form__grid {
        display: grid;
        grid-template-columns: minmax(0, 1fr);
        gap: 1rem;
      }

      .app-global-search-form__label {
        display: block;
        color: #121a2b;
        font-size: 0.875rem;
        font-weight: 600;
      }

      .app-global-search-form__control {
        display: block;
        width: 100%;
        margin-top: 0.25rem;
        border: 1px solid #26324a;
        border-radius: 0.75rem;
        padding: 0.5rem 0.75rem;
        background: transparent;
        color: #121a2b;
        font-size: 1rem;
        box-shadow: 0 1px 2px rgba(18, 26, 43, 0.08);
      }

      .app-global-search-form__control::placeholder {
        color: #33415f;
        opacity: 1;
      }

      .app-global-search-form__button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 0.75rem;
        padding: 0.5rem 1rem;
        font-size: 0.875rem;
        font-weight: 600;
      }

      .app-global-search-form__button--submit {
        border: 1px solid #090f1d;
        background: #090f1d;
        color: #f5f8ff;
      }

      .app-global-search-form__button--reset {
        border: 1px solid #33415f;
        background: transparent;
        color: #121a2b;
      }

      .app-global-search-form__helper,
      .app-secondary-header__description,
      .app-secondary-header__glossary {
        color: #33415f;
        font-size: 0.875rem;
      }

      .app-global-search-form__helper,
      .app-secondary-header__description,
      .app-secondary-header__glossary {
        margin: 0.5rem 0 0;
      }

      @media (min-width: 640px) {
        .app-secondary-header__inner {
          padding-inline: 1.5rem;
        }
      }

      @media (min-width: 768px) {
        .app-global-search-form__grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (min-width: 1024px) {
        .app-secondary-header__inner {
          padding-inline: 2rem;
        }

        .app-global-search-form__grid {
          grid-template-columns: minmax(0, 1.4fr) minmax(0, 1fr) minmax(0, 1fr) auto auto;
          align-items: end;
        }
      }

      @media (prefers-color-scheme: dark) {
        html:not([data-theme='light']),
        html:not([data-theme='light']) body {
          background: #050913;
          color: #f6f8ff;
        }

        html:not([data-theme='light']) .app-secondary-header {
          border-bottom-color: #6f8db9;
          background: #0f1a30;
        }

        html:not([data-theme='light']) .app-secondary-theme-toggle,
        html:not([data-theme='light']) .app-secondary-nav__link {
          border-color: #8ea7cd;
          color: #f6f8ff;
        }

        html:not([data-theme='light']) .app-global-search-form {
          border-color: #8ea7cd;
          background: #182845;
          box-shadow: 0 1px 2px rgba(7, 13, 26, 0.24);
        }

        html:not([data-theme='light']) .app-global-search-form__helper,
        html:not([data-theme='light']) .app-global-search-form__label,
        html:not([data-theme='light']) .app-global-search-form__control,
        html:not([data-theme='light']) .app-global-search-form__button--reset,
        html:not([data-theme='light']) .app-secondary-header__description,
        html:not([data-theme='light']) .app-secondary-header__glossary {
          color: #bccde7;
        }

        html:not([data-theme='light']) .app-global-search-form__control {
          border-color: #c6d4ec;
        }

        html:not([data-theme='light']) .app-global-search-form__control::placeholder {
          color: #bccde7;
        }

        html:not([data-theme='light']) .app-global-search-form__button--submit {
          border-color: #f7f9ff;
          background: #f7f9ff;
          color: #070d1a;
        }

        html:not([data-theme='light']) .app-global-search-form__button--reset {
          border-color: #c6d4ec;
        }
      }

      html[data-theme='dark'],
      html[data-theme='dark'] body {
        background: #050913;
        color: #f6f8ff;
      }

      html[data-theme='dark'] .app-secondary-header {

      html[data-theme='dark'] .app-secondary-theme-toggle,

      html[data-theme='dark'] .app-secondary-header__description,
      html[data-theme='dark'] .app-secondary-header__glossary {

      }

      html[data-theme='dark'] .app-global-search-form__control::placeholder {

      }

      html[data-theme='dark'] .app-global-search-form__button--submit {

        color: #070d1a;
      }

      html[data-theme='dark'] .app-global-search-form__button--reset {
        border-color: #c6d4ec;
      }

    <script>
      (function () {
        try {
          var rawPreference = window.localStorage.getItem('annuaire-rgaa-theme');
          var preference = rawPreference === 'light' || rawPreference === 'dark' ? rawPreference : 'system';
          var systemDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          var resolvedTheme = preference === 'system' ? (systemDark ? 'dark' : 'light') : preference;
          var root = document.documentElement;
          root.setAttribute('data-theme', resolvedTheme);
          root.classList.toggle('dark', resolvedTheme === 'dark');
          root.style.colorScheme = resolvedTheme;
        } catch (_) {
          // Keep default CSS preference when storage is unavailable.
        }
      })();
    </script>
    <script>
      (function () {
        var url = window.location.origin + window.location.pathname;
        var pathname = window.location.pathname;
        var canonical = document.querySelector('link[rel="canonical"]');
        var ogUrl = document.querySelector('meta[property="og:url"]');
        var twitterUrl = document.querySelector('meta[name="twitter:url"]');
        var description = document.querySelector('meta[name="description"]');
        var ogTitle = document.querySelector('meta[property="og:title"]');
        var ogDescription = document.querySelector('meta[property="og:description"]');
        var twitterTitle = document.querySelector('meta[name="twitter:title"]');
        var twitterDescription = document.querySelector('meta[name="twitter:description"]');
        var robots = document.querySelector('meta[name="robots"]');
        var title = 'Annuaire RGAA';
        var metaDescription = 'Annuaire français pour valoriser la conformité RGAA : page de déclaration, score et bonnes pratiques officielles.';
        var robotsValue = 'index,follow,max-image-preview:large,max-snippet:-1,max-video-preview:-1';
        if (/^\/plan-du-site\/?$/.test(pathname)) {
          title = 'Plan du site | Annuaire RGAA';
          metaDescription = 'Plan du site de l’annuaire RGAA: pages publiques, fiches site indexables et ressources techniques SEO.';
        } else if (/^\/accessibilite\/?$/.test(pathname)) {
          title = 'Accessibilité | Annuaire RGAA';
          metaDescription = 'Déclaration d’accessibilité de l’annuaire RGAA: statut de conformité, méthodologie de test, stack technique, outils, contact et voies de recours.';
        } else if (/^\/site\/[a-z0-9-]{4,120}\/?$/.test(pathname)) {
          title = 'Fiche annuaire | Annuaire RGAA';
          metaDescription = 'Consultez les informations publiques d’un site référencé dans l’annuaire RGAA et ses liens utiles d’accessibilité.';
        } else if (pathname.indexOf('/site/') === 0) {
          title = 'Fiche annuaire introuvable | Annuaire RGAA';
          metaDescription = 'La fiche demandée n’a pas été trouvée dans l’annuaire RGAA. Retournez à l’accueil pour parcourir les sites référencés.';
          robotsValue = 'noindex,follow';
        } else if (/^\/domaine\/[a-z0-9-]{4,120}\/?$/.test(pathname)) {
          title = 'Domaine multi-sites | Annuaire RGAA';
          metaDescription = 'Consultez toutes les fiches publiques rattachées à un même domaine racine dans l’annuaire RGAA.';
        } else if (pathname.indexOf('/domaine/') === 0) {
          title = 'Domaine multi-sites introuvable | Annuaire RGAA';
          metaDescription = 'Le domaine demandé n’a pas été trouvé dans l’annuaire RGAA. Retournez à l’accueil pour parcourir les fiches publiques.';
          robotsValue = 'noindex,follow';
        } else if (pathname.indexOf('/moderation') === 0) {
          title = 'Modération | Annuaire RGAA';
          metaDescription = 'Espace de modération de l’annuaire RGAA.';
          robotsValue = 'noindex,follow';
        }
        if (canonical) canonical.setAttribute("href", url);
        if (ogUrl) ogUrl.setAttribute("content", url);
        if (twitterUrl) twitterUrl.setAttribute("content", url);
        if (description) description.setAttribute("content", metaDescription);
        if (ogTitle) ogTitle.setAttribute("content", title);
        if (ogDescription) ogDescription.setAttribute("content", metaDescription);
        if (twitterTitle) twitterTitle.setAttribute("content", title);
        if (twitterDescription) twitterDescription.setAttribute("content", metaDescription);
        if (robots) robots.setAttribute("content", robotsValue);
        document.title = title;
      })();
    </script>
