<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo-rgaa-vitrine.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="index,follow,max-image-preview:large,max-snippet:-1,max-video-preview:-1" />
    <meta name="author" content="Aurélien Lewin" />
    <meta name="application-name" content="Vitrine Fierté RGAA" />
    <meta name="theme-color" content="#0f172a" />
    <meta
      name="keywords"
      content="RGAA, accessibilité numérique, conformité RGAA, déclaration accessibilité, vitrine accessibilité"
    />
    <meta
      name="description"
      content="Vitrine française pour valoriser la conformité RGAA : analyse URL, score accessibilité, page de déclaration et bonnes pratiques officielles."
    />
    <link rel="canonical" href="https://rgaa-pride-vitrine.invalid/" />
    <link rel="alternate" href="https://rgaa-pride-vitrine.invalid/" hreflang="fr-FR" />

    <meta property="og:locale" content="fr_FR" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Vitrine Fierté RGAA" />
    <meta property="og:title" content="Vitrine Fierté RGAA" />
    <meta
      property="og:description"
      content="Valorisez la conformité RGAA de votre site avec une vitrine claire, filtrable et orientée accessibilité."
    />
    <meta property="og:url" content="https://rgaa-pride-vitrine.invalid/" />
    <meta property="og:image" content="https://rgaa-vitrine.org/logo-rgaa-vitrine.svg" />
    <meta property="og:image:alt" content="Logo officiel RGAA Vitrine" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Vitrine Fierté RGAA" />
    <meta
      name="twitter:description"
      content="Analysez une URL et mettez en avant la conformité RGAA de votre site."
    />
    <meta name="twitter:image" content="https://rgaa-vitrine.org/logo-rgaa-vitrine.svg" />
    <title>Vitrine Fierté RGAA</title>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Vitrine Fierté RGAA",
        "inLanguage": "fr-FR",
        "description": "Plateforme de valorisation de la conformité RGAA des sites web.",
        "publisher": {
          "@type": "Organization",
          "name": "Vitrine Fierté RGAA",
          "url": "https://github.com/aurelienlewin",
          "logo": "https://rgaa-vitrine.org/logo-rgaa-vitrine.svg"
        },
        "creator": {
          "@type": "Person",
          "name": "Aurélien Lewin",
          "url": "https://github.com/aurelienlewin"
        }
      }
    </script>
    <script>
      (function () {
        var url = window.location.origin + window.location.pathname;
        var canonical = document.querySelector('link[rel="canonical"]');
        var ogUrl = document.querySelector('meta[property="og:url"]');
        if (canonical) canonical.setAttribute("href", url);
        if (ogUrl) ogUrl.setAttribute("content", url);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      Cette application nécessite JavaScript pour afficher la vitrine RGAA interactive.
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
